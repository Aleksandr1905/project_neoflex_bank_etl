services:
  # Банковская БД
  bank_db:
    image: postgres:15
    container_name: bank_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bank_db
      - POSTGRES_USER=bank_user
      - POSTGRES_PASSWORD=${BANK_DB_PASSWORD}
    volumes:
      - bank_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_user -d bank_db"]
      interval: 5s
      retries: 5

  # БД Airflow
  airflow_db:
    image: postgres:15
    container_name: airflow_postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=airflow
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  # Инициализация Airflow
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: custom-airflow-bank:1.0
    depends_on:
      airflow_db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow_db/airflow
    command: bash -c "airflow db init && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password ${AIRFLOW_ADMIN_PASSWORD} || true"

  # Web сервер Airflow
  airflow-webserver:
    image: custom-airflow-bank:1.0
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow_db/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
      - AIRFLOW_CONN_BANK_DB=postgresql://bank_user:${BANK_DB_PASSWORD}@bank_db:5432/bank_db
    command: webserver

  # Scheduler Airflow
  airflow-scheduler:
    image: custom-airflow-bank:1.0
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow_db/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
      - AIRFLOW_CONN_BANK_DB=postgresql://bank_user:${BANK_DB_PASSWORD}@bank_db:5432/bank_db
    command: scheduler

volumes:
  bank_postgres_data:
  airflow_postgres_data: